<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .bar { background:#000; height:24px; }
  .row { display:flex; align-items:center; gap:14px; }
  .tok { font-family:'JetBrains Mono',monospace; font-size:11px; color:#707070; width:64px; flex-shrink:0; }
  .val { font-family:'JetBrains Mono',monospace; font-size:11px; color:#707070; width:48px; flex-shrink:0; text-align:right; }
</style></head>
<body>
<div class="card">
  <div style="display:flex;flex-direction:column;gap:6px;">
    <div class="row"><div class="tok">sp-1</div><div class="bar" style="width:4px;"></div><div class="val">4</div></div>
    <div class="row"><div class="tok">sp-2</div><div class="bar" style="width:8px;"></div><div class="val">8</div></div>
    <div class="row"><div class="tok">sp-3</div><div class="bar" style="width:12px;"></div><div class="val">12</div></div>
    <div class="row"><div class="tok">sp-4</div><div class="bar" style="width:16px;"></div><div class="val">16</div></div>
    <div class="row"><div class="tok">sp-6</div><div class="bar" style="width:24px;"></div><div class="val">24</div></div>
    <div class="row"><div class="tok">sp-8</div><div class="bar" style="width:32px;"></div><div class="val">32</div></div>
    <div class="row"><div class="tok">sp-12</div><div class="bar" style="width:48px;"></div><div class="val">48</div></div>
    <div class="row"><div class="tok">sp-16</div><div class="bar" style="width:64px;"></div><div class="val">64</div></div>
    <div class="row"><div class="tok">sp-24</div><div class="bar" style="width:96px;"></div><div class="val">96</div></div>
    <div class="row"><div class="tok">sp-32</div><div class="bar" style="width:128px;"></div><div class="val">128</div></div>
  </div>
  <div style="font-family:'Saira',sans-serif;font-weight:600;font-size:11px;letter-spacing:0.12em;color:#3A3A3A;text-transform:uppercase;margin-top:18px;">4 px base · pick small or large · skip the middle</div>
</div>
</body></html>
