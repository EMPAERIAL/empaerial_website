<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>

    <div style="background:#fff;border:1px solid #D4D4D4;padding:0;">
      <svg viewBox="0 0 600 60" preserveAspectRatio="none" style="display:block;width:100%;height:24px;color:#000;"><path d="M 0 0 L 600 0 L 600 18 Q 300 60 0 18 Z" fill="currentColor"/></svg>

        <div style="display:flex;gap:8px;margin-top:14px;">

      </div>
    </div>
    <!-- Plain card -->
    <div style="background:#fff;border:1px solid #D4D4D4;padding:20px;">
      <div style="font-family:'Saira',sans-serif;font-weight:600;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#707070;">BRIEF</div>
      <div style="font-family:'Inter',sans-serif;font-weight:600;font-size:18px;color:#000;margin-top:6px;line-height:1.3;">Submissions close Friday at 23:59 ET.</div>
      <div style="font-family:'Inter',sans-serif;font-size:13px;color:#3A3A3A;line-height:1.5;margin-top:10px;">Each team must submit a one-page flight plan with scope, milestones, and a deploy target.</div>
      <div style="height:1px;background:#D4D4D4;margin:14px -20px 12px;"></div>
      <a style="font-family:'Inter',sans-serif;font-weight:500;font-size:13px;color:#000;">Read full brief →</a>

  </div>
