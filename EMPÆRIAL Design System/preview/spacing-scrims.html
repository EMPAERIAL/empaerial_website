<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .row { display:flex; align-items:center; gap:16px; padding:10px 0; }
  .lab { font-family:'JetBrains Mono',monospace; font-size:11px; color:#707070; width:120px; flex-shrink:0; }
</style></head>
<body>
<div class="card">
  <div class="row">
    <div class="lab">--scrim-modal</div>
    <div style="flex:1;height:48px;background:linear-gradient(90deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.6) 100%);background-color:#fff;background-image:repeating-linear-gradient(45deg,#EFEFEF 0px,#EFEFEF 6px,#fff 6px,#fff 12px),linear-gradient(90deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.6) 100%);background-blend-mode:normal;position:relative;">
      <div style="position:absolute;inset:0;background:rgba(0,0,0,0.6);"></div>
    </div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#707070;width:80px;text-align:right;">α 0.60</div>
  </div>
  <div class="row">
    <div class="lab">--scrim-photo</div>
    <div style="flex:1;height:48px;background:#000;position:relative;">
      <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 0%, rgba(0,0,0,0.7) 100%);"></div>
      <div style="position:absolute;left:12px;bottom:6px;color:#fff;font-family:'Saira',sans-serif;font-weight:600;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;">Hero photo · caption</div>
    </div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#707070;width:80px;text-align:right;">α 0.70</div>
  </div>
  <div class="row">
    <div class="lab">--scrim-nav</div>
    <div style="flex:1;height:48px;background:repeating-linear-gradient(45deg,#EFEFEF 0px,#EFEFEF 6px,#fff 6px,#fff 12px);position:relative;">
      <div style="position:absolute;inset:0;background:rgba(255,255,255,0.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);"></div>
      <div style="position:relative;padding:14px 12px;font-family:'Saira',sans-serif;font-weight:600;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;">Sticky nav · backdrop blur 8px</div>
    </div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#707070;width:80px;text-align:right;">α 0.85</div>
  </div>
  <div style="font-family:'Inter',sans-serif;font-size:13px;color:#3A3A3A;line-height:1.5;margin-top:8px;">Three scrims, used only for layer hierarchy. No decorative transparency.</div>
</div>
</body></html>
