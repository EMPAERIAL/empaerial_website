<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  @keyframes mover {
    0%, 8% { transform: translateX(0); }
    50%, 58% { transform: translateX(160px); }
    100% { transform: translateX(0); }
  }
  .ball {
    width: 28px; height: 28px; background: #000; border-radius: 9999px;
    animation: mover 2.4s var(--ease) infinite;
  }
  .lane { position: relative; height: 28px; width: 220px; background: #EFEFEF; }
  .row { display: flex; align-items: center; gap: 18px; padding: 6px 0; }
  .tok { font-family:'JetBrains Mono',monospace; font-size:11px; color:#707070; width:140px; }
</style></head>
<body>
<div class="card">
  <div class="row"><div class="tok">--ease-prop</div><div class="lane"><div class="ball" style="--ease: cubic-bezier(0.2, 0, 0, 1);"></div></div></div>
  <div class="row"><div class="tok">--ease-out</div><div class="lane"><div class="ball" style="--ease: cubic-bezier(0, 0, 0.2, 1);"></div></div></div>
  <div class="row"><div class="tok">linear (ref)</div><div class="lane"><div class="ball" style="--ease: linear;"></div></div></div>
  <div style="height:1px;background:#D4D4D4;margin:14px 0;"></div>
  <div style="display:flex;gap:24px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#707070;">
    <div><span style="color:#000;font-weight:500;">120ms</span> · micro · hover, focus</div>
    <div><span style="color:#000;font-weight:500;">200ms</span> · state · modal in/out</div>
    <div><span style="color:#000;font-weight:500;">400ms</span> · page · once-per-load</div>
  </div>
</div>
</body></html>
