<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .btn {
    font-family:'Saira',sans-serif; font-weight:600; font-size:13px;
    letter-spacing:0.14em; text-transform:uppercase;
    padding:14px 28px; border:none; cursor:pointer;
    transition: background var(--dur-micro) var(--ease-prop);
  }
  .btn-pill { border-radius:9999px; }
  .btn-square { border-radius:0; }
  .btn-pri { background:#000; color:#fff; }
  .btn-pri-hover { background:#0A0A0A; color:#fff; }
  .btn-pri-press { background:#1A1A1A; color:#fff; }
  .btn-pri-disabled { background:#A8A8A8; color:#fff; cursor:not-allowed; }
  .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
  .lab { font-family:'JetBrains Mono',monospace; font-size:10px; color:#707070; margin-top:8px; text-align:center; }
  .col { display:flex; flex-direction:column; gap:0; align-items:center; }
</style></head>
<body>
<div class="card">
  <div style="display:flex;gap:18px;flex-wrap:wrap;">
    <div class="col"><button class="btn btn-pill btn-pri">LAUNCH</button><div class="lab">default</div></div>
    <div class="col"><button class="btn btn-pill btn-pri-hover">LAUNCH</button><div class="lab">hover</div></div>
    <div class="col"><button class="btn btn-pill btn-pri-press">LAUNCH</button><div class="lab">pressed</div></div>
    <div class="col"><button class="btn btn-pill btn-pri-disabled">LAUNCH</button><div class="lab">disabled</div></div>
  </div>
  <div style="height:1px;background:#D4D4D4;margin:18px 0;"></div>
  <div style="display:flex;gap:18px;flex-wrap:wrap;align-items:center;">
    <div class="col"><button class="btn btn-square btn-pri">SUBMIT</button><div class="lab">square primary</div></div>
    <div class="col"><button class="btn btn-pill btn-pri" style="padding:10px 20px;font-size:11px;">SMALL</button><div class="lab">small</div></div>
    <div class="col"><button class="btn btn-pill btn-pri" style="padding:18px 36px;font-size:14px;">LARGE</button><div class="lab">large</div></div>
  </div>
</div>
</body></html>
