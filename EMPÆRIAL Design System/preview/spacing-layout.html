<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="padding:0;">
  <div style="background:#FAFAFA;padding:28px;display:flex;align-items:center;gap:32px;">
    <!-- Layout diagram -->
    <div style="flex:1;display:grid;grid-template-columns:repeat(12,1fr);gap:6px;">
      <div style="grid-column:span 12;height:8px;background:#000;"></div>
      <div style="grid-column:span 8;height:54px;background:#000;"></div>
      <div style="grid-column:span 4;height:54px;background:#fff;border:1px solid #D4D4D4;"></div>
      <div style="grid-column:span 4;height:34px;background:#EFEFEF;"></div>
      <div style="grid-column:span 4;height:34px;background:#EFEFEF;"></div>
      <div style="grid-column:span 4;height:34px;background:#EFEFEF;"></div>
      <div style="grid-column:span 12;height:8px;background:#000;"></div>
    </div>
    <!-- Stats -->
    <div style="width:200px;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:11px;color:#000;line-height:1.9;">
      <div><span style="color:#707070;">cols </span>12</div>
      <div><span style="color:#707070;">gap </span>24px</div>
      <div><span style="color:#707070;">margin </span>80px / 24px</div>
      <div><span style="color:#707070;">content </span>1280px max</div>
      <div><span style="color:#707070;">prose </span>720px max</div>
      <div><span style="color:#707070;">nav-h </span>64px</div>
    </div>
  </div>
  <div style="padding:14px 28px;border-top:1px solid #D4D4D4;font-family:'Saira',sans-serif;font-weight:600;font-size:11px;letter-spacing:0.12em;color:#3A3A3A;text-transform:uppercase;">12-column · sections breathe · no floating elements</div>
</div>
</body></html>
