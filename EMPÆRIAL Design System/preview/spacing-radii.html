<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:18px;align-items:end;">
    <div style="text-align:center;">
      <div style="height:120px;display:flex;align-items:center;justify-content:center;">
        <div style="width:120px;height:120px;background:#000;border-radius:0;"></div>
      </div>
      <div class="label-display" style="margin-top:14px;">radius-sharp</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#707070;">0 · default</div>
    </div>
    <div style="text-align:center;">
      <div style="height:120px;display:flex;align-items:center;justify-content:center;">
        <div style="width:120px;height:48px;background:#000;border-radius:2px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Saira',sans-serif;font-weight:600;font-size:11px;letter-spacing:0.12em;">CHIP / TAG</div>
      </div>
      <div class="label-display" style="margin-top:14px;">radius-chip</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#707070;">2px · tags only</div>
    </div>
    <div style="text-align:center;">
      <div style="height:120px;display:flex;align-items:center;justify-content:center;">
        <div style="width:160px;height:48px;background:#000;border-radius:9999px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Saira',sans-serif;font-weight:600;font-size:12px;letter-spacing:0.14em;">WING BUTTON</div>
      </div>
      <div class="label-display" style="margin-top:14px;">radius-pill</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#707070;">9999px · wings + Æ</div>
    </div>
  </div>
  <div style="font-family:'Inter',sans-serif;font-size:13px;color:#3A3A3A;margin-top:18px;text-align:center;">No 4 / 8 / 12 px radii. Pick square or pill.</div>
</div>
</body></html>
