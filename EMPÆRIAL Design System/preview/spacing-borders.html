<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;">
    <div>
      <div style="height:90px;background:#fff;border:1px solid #D4D4D4;display:flex;align-items:center;justify-content:center;font-family:'Saira',sans-serif;font-weight:600;font-size:11px;letter-spacing:0.12em;color:#3A3A3A;">HAIRLINE</div>
      <div class="label-display" style="margin-top:10px;">bw-hairline</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#707070;">1px · ink-10</div>
    </div>
    <div>
      <div style="height:90px;background:#fff;border:2px solid #000;display:flex;align-items:center;justify-content:center;font-family:'Saira',sans-serif;font-weight:600;font-size:11px;letter-spacing:0.12em;color:#000;">STRONG</div>
      <div class="label-display" style="margin-top:10px;">bw-strong</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#707070;">2px · ink-100</div>
    </div>
    <div>
      <div style="height:90px;background:#fff;border:4px solid #000;display:flex;align-items:center;justify-content:center;font-family:'Saira',sans-serif;font-weight:600;font-size:11px;letter-spacing:0.12em;color:#000;">DISPLAY</div>
      <div class="label-display" style="margin-top:10px;">bw-display</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#707070;">4px · hero rules</div>
    </div>
  </div>
  <div style="height:1px;background:#D4D4D4;margin:18px 0;"></div>
  <div style="font-family:'Inter',sans-serif;font-size:13px;color:#3A3A3A;line-height:1.5;">
    Most surface separation is hairlines, not shadow. Rules are full-bleed at section breaks, inset 16–24 px between list items.
  </div>
</div>
</body></html>
