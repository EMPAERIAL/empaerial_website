<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .chip {
    font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:500;
    padding:4px 10px; border-radius:2px;
    display:inline-flex; align-items:center; gap:6px;
  }
  .badge {
    font-family:'Saira',sans-serif; font-weight:600; font-size:10px; letter-spacing:0.14em; text-transform:uppercase;
    padding:5px 11px; border-radius:0;
    display:inline-flex; align-items:center; gap:6px;
  }
  .dot { width:6px; height:6px; border-radius:9999px; background:currentColor; }
  .lab { font-family:'JetBrains Mono',monospace; font-size:10px; color:#707070; }
</style></head>
<body>
<div class="card">
  <div class="lab" style="margin-bottom:8px;">Tech chips · mono · 2px radius</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;">
    <span class="chip" style="background:#000;color:#fff;">REACT</span>
    <span class="chip" style="background:#000;color:#fff;">TYPESCRIPT</span>
    <span class="chip" style="background:#fff;color:#000;border:1px solid #000;">GO</span>
    <span class="chip" style="background:#fff;color:#000;border:1px solid #000;">RUST</span>
    <span class="chip" style="background:#EFEFEF;color:#3A3A3A;">PYTHON</span>
  </div>
  <div style="height:1px;background:#D4D4D4;margin:18px 0 14px;"></div>
  <div class="lab" style="margin-bottom:8px;">Status badges · display · square</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
    <span class="badge" style="background:#000;color:#fff;"><span class="dot"></span>DEPLOYED</span>
    <span class="badge" style="background:#fff;color:#000;border:1px solid #000;"><span class="dot"></span>IN FLIGHT</span>
    <span class="badge" style="background:#fff;color:#707070;border:1px solid #D4D4D4;"><span class="dot" style="background:#A8A8A8;"></span>GROUNDED</span>
    <span class="badge" style="background:#fff;color:#B00020;border:1px solid #B00020;"><span class="dot" style="background:#B00020;"></span>ABORT</span>
  </div>
  <div style="height:1px;background:#D4D4D4;margin:18px 0 14px;"></div>
  <div class="lab" style="margin-bottom:8px;">Counters · telemetry mono</div>
  <div style="display:flex;gap:24px;font-family:'JetBrains Mono',monospace;font-size:13px;">
    <span><span style="color:#707070;">active </span><span style="font-weight:500;color:#000;">12</span></span>
    <span><span style="color:#707070;">deployed </span><span style="font-weight:500;color:#000;">04</span></span>
    <span><span style="color:#707070;">grounded </span><span style="font-weight:500;color:#000;">00</span></span>
  </div>
</div>
</body></html>
