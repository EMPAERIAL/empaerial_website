<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="padding:0;">
  <!-- Photo well: B&W high-contrast aerospace placeholder using SVG -->
  <div style="height:200px;background:#000;position:relative;overflow:hidden;">
    <!-- Suggestive geometry: horizon + craft silhouette -->
    <svg viewBox="0 0 700 200" preserveAspectRatio="xMidYMid slice" style="position:absolute;inset:0;width:100%;height:100%;">
      <defs>
        <pattern id="grain" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse">
          <rect width="3" height="3" fill="#000"/>
          <circle cx="1" cy="1" r="0.4" fill="#fff" opacity="0.06"/>
        </pattern>
      </defs>
      <rect width="700" height="120" fill="#1A1A1A"/>
      <rect y="120" width="700" height="80" fill="#000"/>
      <line x1="0" y1="120" x2="700" y2="120" stroke="#3A3A3A" stroke-width="1"/>
      <!-- Aircraft silhouette -->
      <path d="M 80 95 L 240 95 L 280 88 L 360 92 L 360 100 L 280 104 L 240 100 L 80 100 Z" fill="#fff" opacity="0.92"/>
      <ellipse cx="220" cy="98" rx="60" ry="3" fill="#fff" opacity="0.92"/>
      <!-- Distant building / hangar -->
      <rect x="500" y="100" width="160" height="20" fill="#2B2B2B"/>
      <rect x="540" y="92" width="80" height="8" fill="#2B2B2B"/>
      <rect width="700" height="200" fill="url(#grain)"/>
    </svg>
    <!-- Bottom scrim with caption -->
    <div style="position:absolute;left:0;right:0;bottom:0;height:80px;background:linear-gradient(180deg,rgba(0,0,0,0) 0%, rgba(0,0,0,0.7) 100%);"></div>
    <div style="position:absolute;left:20px;bottom:14px;color:#fff;">
      <div style="font-family:'Saira',sans-serif;font-weight:600;font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:#C7C7C7;">FLIGHT 04 · KSC · 03:14 ET</div>
      <div style="font-family:'Saira',sans-serif;font-weight:700;font-size:18px;letter-spacing:0.04em;text-transform:uppercase;margin-top:4px;">Pre-flight</div>
    </div>
  </div>
  <div style="padding:12px 28px;font-family:'Inter',sans-serif;font-size:13px;color:#3A3A3A;line-height:1.5;">
    Photography: B&W, high contrast, slight grain. Studio objects, hardware, hands-on-keyboards. Full-bleed with a hard horizon — never floating in a card.
  </div>
</div>
</body></html>
