<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  label { display:block; font-family:'Saira',sans-serif; font-weight:600; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:#3A3A3A; margin-bottom:6px; }
  .input { font-family:'Inter',sans-serif; font-size:15px; padding:12px 14px; border:1px solid #D4D4D4; background:#fff; color:#000; width:100%; box-sizing:border-box; border-radius:0; outline:none; }
  .input:focus { border-color:#000; }
  .input.filled { border-color:#000; }
  .input.error { border-color:#B00020; }
  .help { font-family:'Inter',sans-serif; font-size:12px; color:#707070; margin-top:4px; }
  .help.err { color:#B00020; }
</style></head>
<body>
<div class="card">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;">
    <div>
      <label>Project name</label>
      <input class="input" placeholder="e.g. Telemetry Dashboard"/>
      <div class="help">Empty / default</div>
    </div>
    <div>
      <label>Team lead</label>
      <input class="input filled" value="A. Reyes"/>
      <div class="help">Filled / focused</div>
    </div>
    <div>
      <label>Submission date</label>
      <input class="input error" value="2026-13-40"/>
      <div class="help err">Invalid date format.</div>
    </div>
    <div>
      <label>Department</label>
      <select class="input" style="appearance:none;background-image:linear-gradient(45deg,transparent 50%,#000 50%),linear-gradient(135deg,#000 50%,transparent 50%);background-position:calc(100% - 18px) 18px,calc(100% - 12px) 18px;background-size:6px 6px;background-repeat:no-repeat;">
        <option>Aerospace Engineering</option>
        <option>Computer Science</option>
      </select>
      <div class="help">Select</div>
    </div>
  </div>
</div>
</body></html>
