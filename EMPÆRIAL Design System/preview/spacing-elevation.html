<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="background:#FAFAFA;">
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;">
    <div style="text-align:center;">
      <div style="height:110px;display:flex;align-items:center;justify-content:center;">
        <div style="width:140px;height:60px;background:#fff;border:1px solid #D4D4D4;"></div>
      </div>
      <div class="label-display" style="margin-top:6px;">shadow-none</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#707070;">default</div>
    </div>
    <div style="text-align:center;">
      <div style="height:110px;display:flex;align-items:center;justify-content:center;">
        <div style="width:140px;height:60px;background:#fff;box-shadow:0 1px 0 #D4D4D4;border-top:1px solid #EFEFEF;"></div>
      </div>
      <div class="label-display" style="margin-top:6px;">shadow-lift</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#707070;">sticky toolbars</div>
    </div>
    <div style="text-align:center;">
      <div style="height:110px;display:flex;align-items:center;justify-content:center;">
        <div style="width:140px;height:60px;background:#fff;box-shadow:0 24px 48px -12px rgba(0,0,0,0.25);"></div>
      </div>
      <div class="label-display" style="margin-top:6px;">shadow-modal</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#707070;">modals only</div>
    </div>
  </div>
  <div style="font-family:'Inter',sans-serif;font-size:13px;color:#3A3A3A;line-height:1.5;margin-top:14px;text-align:center;">
    Two shadows in the system. Cards do not float.
  </div>
</div>
</body></html>
