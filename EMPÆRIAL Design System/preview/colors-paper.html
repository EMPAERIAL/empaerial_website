<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;">
    <div>
      <div style="height:120px;background:#FFFFFF;border:1px solid #D4D4D4;"></div>
      <div class="label-display" style="margin-top:10px;">paper</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#707070;">#FFFFFF · default canvas</div>
    </div>
    <div>
      <div style="height:120px;background:#FAFAFA;border:1px solid #D4D4D4;"></div>
      <div class="label-display" style="margin-top:10px;">paper-warm</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#707070;">#FAFAFA · alt sections</div>
    </div>
    <div>
      <div style="height:120px;background:#F4F4F4;border:1px solid #D4D4D4;"></div>
      <div class="label-display" style="margin-top:10px;">paper-soft</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#707070;">#F4F4F4 · subtle fills</div>
    </div>
  </div>
</div>
</body></html>
